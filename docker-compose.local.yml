services:
  postgres:
    image: postgres:17-alpine
    container_name: ClinicFlowDb_Local
    environment:
      POSTGRES_DB: ClinicFlowDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - clinicflow-db-data:/var/lib/postgresql/data

volumes:
  clinicflow-db-data:
