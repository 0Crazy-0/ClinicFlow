name: Mutation Testing

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      domain: ${{ steps.filter.outputs.domain }}
      application: ${{ steps.filter.outputs.application }}
      infrastructure: ${{ steps.filter.outputs.infrastructure }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            domain:
              - 'ClinicFlow.Domain/**'
              - 'ClinicFlow.Domain.Tests/**'
            application:
              - 'ClinicFlow.Application/**'
              - 'ClinicFlow.Application.Tests/**'
            infrastructure:
              - 'ClinicFlow.Infrastructure/**'
              - 'ClinicFlow.Infrastructure.Tests/**'

  mutation-testing:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      checks: write
    env:
      STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
      DOTNET_ROLL_FORWARD: LatestMajor
      PR_BRANCH: ${{ github.head_ref }}
      BASE_BRANCH: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Install Stryker
        run: dotnet tool install dotnet-stryker --tool-path ./tools

      - name: Run Stryker (main — save baseline)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          REPO_NAME: ${{ github.repository }}
        run: |
          projects=("ClinicFlow.Domain.Tests" "ClinicFlow.Application.Tests" "ClinicFlow.Infrastructure.Tests")
          for proj in "${projects[@]}"; do
            cd "$proj"
            ../tools/dotnet-stryker --version main
            cd ..
          done

      - name: Run Stryker Domain (PR)
        if: github.event_name == 'pull_request' && needs.changes.outputs.domain == 'true'
        run: |
          cd ClinicFlow.Domain.Tests
          ../tools/dotnet-stryker --with-baseline:"$BASE_BRANCH" --version "$PR_BRANCH"

      - name: Run Stryker Application (PR)
        if: github.event_name == 'pull_request' && needs.changes.outputs.application == 'true'
        run: |
          cd ClinicFlow.Application.Tests
          ../tools/dotnet-stryker --with-baseline:"$BASE_BRANCH" --version "$PR_BRANCH"

      - name: Run Stryker Infrastructure (PR)
        if: github.event_name == 'pull_request' && needs.changes.outputs.infrastructure == 'true'
        run: |
          cd ClinicFlow.Infrastructure.Tests
          ../tools/dotnet-stryker --with-baseline:"$BASE_BRANCH" --version "$PR_BRANCH"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: "**/StrykerOutput/**/*.html"