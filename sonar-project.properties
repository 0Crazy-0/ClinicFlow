# Project identification
sonar.projectKey=0Crazy-0_ClinicFlow
sonar.organization=0crazy-0

# Project display metadata
sonar.projectName=ClinicFlow
sonar.projectVersion=1.0.0

sonar.sourceEncoding=UTF-8

# Files excluded from source analysis (bugs, smells, vulnerabilities)
sonar.exclusions=\
  **/Migrations/**,\
  **/*.Designer.cs

# Files excluded from code coverage calculation
sonar.coverage.exclusions=\
  **/Migrations/**,\
  **/Program.cs,\
  **/Events/**/*.cs,\
  **/DependencyInjection.cs,\
  **/ApplicationDbContextFactory.cs,\
  ClinicFlow.Infrastructure/Persistence/Seeding/**,\
  ClinicFlow.Infrastructure/Persistence/Options/**,\
  **/Configurations/**

# Files excluded from duplication detection
sonar.cpd.exclusions=\
  **/Migrations/**,\
  **/Configurations/**,\
  **/ApplicationDbContextFactory.cs,\
  **/ApplicationDbContext.cs,\
  **/Seeding/**,\
  **/GetAllActiveAppointmentTypesQueryHandler.cs,\
  **/GetAppointmentTypeByIdQueryHandler.cs,\
  **/GetAppointmentTypesByCategoryQueryHandler.cs,\
  **/GetEligibleAppointmentTypesQueryHandler.cs

# Test file patterns (explicitly mark test projects so SonarCloud
# does not count them toward production code metrics)
sonar.test.inclusions=\
  ClinicFlow.Domain.Tests/**,\
  ClinicFlow.Application.Tests/**,\
  ClinicFlow.Infrastructure.Tests/**
