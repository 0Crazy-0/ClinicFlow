codecov:
  require_ci_to_pass: true
  max_report_age: false

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto       
        threshold: 1%
        informational: false
    patch:
      default:
        target: 80%
        informational: false

flags:
  domain:
    paths:
      - src/ClinicFlow.Domain/
  application:
    paths:
      - src/ClinicFlow.Application/

ignore:
  - "**/Migrations"
  - "**/*.Designer.cs"
  - "tests/**/*"
  
comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false